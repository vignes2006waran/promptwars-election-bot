<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoteGuide AI — Election Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e3a5f;
      --accent: #3b82f6;
      --accent2: #f97316;
      --accent3: #22c55e;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --user-bubble: #1e3a5f;
      --bot-bubble: #111827;
      --glow: rgba(59,130,246,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(249,115,22,0.06) 0%, transparent 60%);
    }

    /* Header */
    header {
      padding: 16px 24px;
      background: rgba(17,24,39,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(59,130,246,0.4);
    }

    .header-info h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-info p {
      font-size: 11px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      padding: 4px 12px; border-radius: 999px;
      font-size: 11px; color: var(--accent3);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      width: 6px; height: 6px;
      background: var(--accent3);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Language selector */
    .lang-bar {
      padding: 8px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
      flex-shrink: 0;
    }

    .lang-bar span { font-size: 11px; color: var(--text-dim); }

    .lang-btn {
      padding: 3px 12px; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim);
      font-size: 11px; cursor: pointer; font-family: 'Sora', sans-serif;
      transition: all 0.2s;
    }

    .lang-btn.active, .lang-btn:hover {
      background: var(--accent); border-color: var(--accent);
      color: white;
    }

    /* Quick questions */
    .quick-bar {
      padding: 10px 24px;
      display: flex; gap: 8px; overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .quick-bar::-webkit-scrollbar { display: none; }

    .quick-chip {
      white-space: nowrap;
      padding: 6px 14px; border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 12px; cursor: pointer;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .quick-chip:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(59,130,246,0.08);
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 30px 20px;
      animation: fadeIn 0.6s ease;
    }

    .welcome-icon {
      font-size: 48px; margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-size: 22px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(90deg, #60a5fa, #f97316);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .welcome p { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

    /* Messages */
    .msg {
      display: flex; gap: 10px;
      animation: slideUp 0.3s ease;
      max-width: 85%;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.bot { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .msg.user .avatar { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
    .msg.bot .avatar { background: linear-gradient(135deg, #7c3aed, #a855f7); }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.7;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(59,130,246,0.3);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .bubble ul { padding-left: 16px; }
    .bubble li { margin: 4px 0; }
    .bubble strong { color: #93c5fd; }

    /* Typing indicator */
    .typing .bubble {
      display: flex; gap: 4px; align-items: center;
      padding: 14px 16px;
    }

    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      background: rgba(17,24,39,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Sora', sans-serif;
      font-size: 13px; resize: none; max-height: 100px;
      min-height: 20px; line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-dim); }

    #sendBtn {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 0 15px rgba(59,130,246,0.3);
    }

    #sendBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(59,130,246,0.5); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 10px; color: var(--text-dim);
      text-align: center; margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* Tricolor accent line */
    .tricolor {
      height: 3px;
      background: linear-gradient(90deg, #ff9933 33%, white 33%, white 66%, #138808 66%);
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #chat { padding: 16px; }
      .input-area { padding: 12px 16px; }
      .msg { max-width: 95%; }
    }
  </style>
</head>
<body>

<div class="tricolor"></div>

<header>
  <div class="logo">🗳️</div>
  <div class="header-info">
    <h1>VoteGuide AI</h1>
    <p>Powered by Gemini · Election Education Assistant</p>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    LIVE
  </div>
</header>

<div class="lang-bar">
  <span>Language:</span>
  <button class="lang-btn active" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('ta')">தமிழ்</button>
  <button class="lang-btn" onclick="setLang('hi')">हिंदी</button>
</div>

<div class="quick-bar">
  <button class="quick-chip" onclick="askQuick('How do I register as a voter?')">📝 Voter Registration</button>
  <button class="quick-chip" onclick="askQuick('How to find my polling booth?')">📍 Find Polling Booth</button>
  <button class="quick-chip" onclick="askQuick('What documents do I need on election day?')">📄 Documents Needed</button>
  <button class="quick-chip" onclick="askQuick('How does EVM work?')">🖥️ How EVM Works</button>
  <button class="quick-chip" onclick="askQuick('How to check my name in voter list?')">🔍 Check Voter List</button>
  <button class="quick-chip" onclick="askQuick('What is NOTA?')">❓ What is NOTA?</button>
</div>

<div id="chat">
  <div class="welcome">
    <span class="welcome-icon">🇮🇳</span>
    <h2>Your Election Guide is Ready!</h2>
    <p>Ask me anything about Indian elections — voter registration,<br/>polling booths, EVM, your rights as a voter, and more.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" placeholder="Ask about voter registration, polling booths, election process..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
</div>

<script>
  let history = [];
  let currentLang = 'en';

  const langPrompts = {
    en: 'Please respond in English.',
    ta: 'Please respond in Tamil (தமிழ்).',
    hi: 'Please respond in Hindi (हिंदी).'
  };

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function askQuick(question) {
    document.getElementById('userInput').value = question;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    let text = input.value.trim();
    if (!text) return;

    // Add language instruction
    const messageWithLang = currentLang !== 'en' ? `${langPrompts[currentLang]} ${text}` : text;

    // Remove welcome screen
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();

    // Show user message
    appendMessage('user', text);
    history.push({ role: 'user', content: messageWithLang });

    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    // Show typing
    const typingId = showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: messageWithLang, history: history.slice(0, -1) })
      });
      const data = await res.json();
      removeTyping(typingId);
      appendMessage('bot', data.response);
      history.push({ role: 'model', content: data.response });
    } catch (e) {
      removeTyping(typingId);
      appendMessage('bot', '⚠️ Connection error. Please try again.');
    }

    btn.disabled = false;
  }

  function appendMessage(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = role === 'user' ? '👤' : '🤖';
    const formatted = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br/>');

    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${formatted}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = id;
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // Enter to send
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto resize textarea
  document.getElementById('userInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
</script>
</body>
</html>
